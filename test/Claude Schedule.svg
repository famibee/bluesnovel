<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300">
<style>
:root{
  --bg:transparent;
  --text:#222;
  --axis:#666;
  --grid:#d9d9d9;
}

@media (prefers-color-scheme: dark){
  :root{
    --text:#f0f0f0;
    --axis:#b5b5b5;
    --grid:#4a4a4a;
  }
}

svg{
  background:var(--bg);
}

text{
  font:11px "Segoe UI","Noto Sans JP",sans-serif;
  fill:var(--text);
}

.title{
  font-size:16px;
  font-weight:600;
}

.axis{
  stroke:var(--axis);
  stroke-width:1.2;
}

.grid{
  stroke:var(--grid);
  stroke-dasharray:3 3;
}

.major{
  stroke:var(--axis);
  stroke-width:1;
}

/* 信号色 */
.g1{fill:#43A047;} /* 1 */
.g2{fill:#C0CA33;} /* 2 */
.g3{fill:#FDD835;} /* 3 */
.g4{fill:#FB8C00;} /* 4 */
.g5{fill:#E53935;} /* 5 */
</style>

<text class="title" x="490" y="22" text-anchor="middle">
Claude 混雑度（JST・1時間ごとの目安）
</text>

<!-- 横グリッド -->
<line class="grid" x1="40" y1="180" x2="950" y2="180"></line>
<line class="grid" x1="40" y1="140" x2="950" y2="140"></line>
<line class="grid" x1="40" y1="100" x2="950" y2="100"></line>
<line class="grid" x1="40" y1="60" x2="950" y2="60"></line>
<line class="grid" x1="40" y1="20" x2="950" y2="20"></line>

<!-- 軸 -->
<line class="axis" x1="40" y1="220" x2="950" y2="220"></line>
<line class="axis" x1="40" y1="20" x2="40" y2="220"></line>

<!-- Y軸 -->
<text x="28" y="184">1</text>
<text x="28" y="144">2</text>
<text x="28" y="104">3</text>
<text x="28" y="64">4</text>
<text x="28" y="24">5</text>

<!-- 6時間ごとの目盛 -->
<line class="major" x1="50" y1="220" x2="50" y2="225"></line>
<line class="major" x1="272" y1="220" x2="272" y2="225"></line>
<line class="major" x1="494" y1="220" x2="494" y2="225"></line>
<line class="major" x1="716" y1="220" x2="716" y2="225"></line>
<line class="major" x1="938" y1="220" x2="938" y2="225"></line>

<!-- 棒グラフ -->
<g>
  <!-- 0-5 -->
  <rect class="g5" x="50" y="20" width="28" height="200"></rect>
  <rect class="g5" x="87" y="20" width="28" height="200"></rect>
  <rect class="g5" x="124" y="20" width="28" height="200"></rect>
  <rect class="g4" x="161" y="60" width="28" height="160"></rect>
  <rect class="g2" x="198" y="140" width="28" height="80"></rect>
  <rect class="g1" x="235" y="180" width="28" height="40"></rect>

  <!-- 6-11 -->
  <rect class="g1" x="272" y="180" width="28" height="40"></rect>
  <rect class="g1" x="309" y="180" width="28" height="40"></rect>
  <rect class="g1" x="346" y="180" width="28" height="40"></rect>
  <rect class="g1" x="383" y="180" width="28" height="40"></rect>
  <rect class="g1" x="420" y="180" width="28" height="40"></rect>
  <rect class="g1" x="457" y="180" width="28" height="40"></rect>

  <!-- 12-17 -->
  <rect class="g1" x="494" y="180" width="28" height="40"></rect>
  <rect class="g1" x="531" y="180" width="28" height="40"></rect>
  <rect class="g1" x="568" y="180" width="28" height="40"></rect>
  <rect class="g1" x="605" y="180" width="28" height="40"></rect>
  <rect class="g1" x="642" y="180" width="28" height="40"></rect>
  <rect class="g2" x="679" y="140" width="28" height="80"></rect>

  <!-- 18-23 -->
  <rect class="g2" x="716" y="140" width="28" height="80"></rect>
  <rect class="g3" x="753" y="100" width="28" height="120"></rect>
  <rect class="g4" x="790" y="60" width="28" height="160"></rect>
  <rect class="g5" x="827" y="20" width="28" height="200"></rect>
  <rect class="g5" x="864" y="20" width="28" height="200"></rect>
  <rect class="g5" x="901" y="20" width="28" height="200"></rect>
</g>

<!-- 時刻 -->
<g text-anchor="middle">
