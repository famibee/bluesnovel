<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>E2E frame</title>
<style>
	body {margin: 0; background-color: #eef; font-family: sans-serif;}
	#mes {padding: 8px;}
	button {margin: 4px;}
</style>
</head>
<body>
	<!-- [set_frame]で入る変数。フレーム側のJSがそれを読んで描画する（本家 _yesno.html と同じ作り） -->
	<p id="mes">（未設定）</p>
	<button id="ok">OK</button>
	<button id="close">CLOSE</button>
<script>
	// var付きでないと [set_frame]/[let_frame] から見えない（window直下のプロパティになるため）
	var val_dic = '';
	var val_cnt = 0;

	// [let_frame function=true] で呼ばれる。戻り値が組み込み変数へ入る
	var val2ctrl = function() {
		document.getElementById('mes').textContent = val_dic;
		++val_cnt;
		return 'ctrl:' + val_dic;
	};
</script>
</body>
</html>
